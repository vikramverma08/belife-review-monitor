name: Fetch Reviews (Every 6 Hours)

on:
  schedule:
    - cron: "0 */6 * * *"  # every 6 hours — stays within $200 free credit
  workflow_dispatch: {}   # manual run from Actions tab

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch reviews from Google Business Profile API
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
        run: node scripts/fetchReviews.js

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp docs/data.json /tmp/data.json
          git fetch origin main
          git reset --hard origin/main
          cp /tmp/data.json docs/data.json
          git add docs/data.json
          git diff --staged --quiet || git commit -m "chore: refresh review data [skip ci]"
          git push origin main || (git pull --rebase origin main && git push origin main)
