name: Poll lab reviews

# Free automation: GitHub Actions runs the poller on a schedule and commits the
# refreshed public/data.json back to the repo. No server, no card, no billing.
on:
  schedule:
    - cron: "0 4 * * *" # daily at 04:00 UTC (~09:30 IST). Adjust as you like.
  workflow_dispatch: {} # lets you run it manually from the Actions tab

jobs:
  poll:
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed to commit data.json
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch reviews
        env:
          OUTSCRAPER_API_KEY: ${{ secrets.OUTSCRAPER_API_KEY }}
        run: node scripts/fetchReviews.js

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data.json
          git diff --staged --quiet || git commit -m "chore: refresh review data [skip ci]"
          git push
